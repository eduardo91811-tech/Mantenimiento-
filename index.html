<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Training Log</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0b0e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

:root {
  --bg: #0a0b0e;
  --surface: #111318;
  --surface2: #181c24;
  --border: #1f2430;
  --border2: #2a3045;
  --text: #e2e6f0;
  --muted: #505878;
  --muted2: #8090b0;
  --push: #f97316;
  --pull: #3b82f6;
  --legs-q: #a855f7;
  --legs-f: #10b981;
  --combo: #f59e0b;
  --rest: #2a3045;
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,11,14,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px; font-weight: 700; letter-spacing: -0.5px;
}
.logo em { color: var(--push); font-style: normal; }
.back-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 7px 14px; border-radius: 10px;
  cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
  display: none; align-items: center; gap: 5px;
}
.back-btn:active { opacity: 0.7; }

/* ── VIEWS ── */
.view { display: none; padding-bottom: 80px; }
.view.active { display: block; }

/* ══ WEEK VIEW ══ */
.week-top { padding: 20px 18px 10px; }
.week-greeting {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted2); margin-bottom: 4px;
}
.week-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
}

.week-nav {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px 16px;
}
.week-nav button {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.week-range { font-size: 12px; color: var(--muted2); flex: 1; }

/* stats */
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; padding: 0 18px 16px;
}
.stat-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 10px; text-align: center;
}
.stat-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700; color: var(--push);
}
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }

/* day cards */
.days-list { padding: 0 18px; display: flex; flex-direction: column; gap: 8px; }

.day-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 14px 14px 0;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.15s;
}
.day-card:active { opacity: 0.8; }
.day-card.is-rest { cursor: default; opacity: 0.55; }
.day-card.is-rest:active { opacity: 0.55; }
.day-card.is-done { border-color: #1a3526; background: #0c1910; }
.day-card.is-today { border-color: var(--border2); }

.day-stripe {
  width: 4px; align-self: stretch; border-radius: 0 3px 3px 0; flex-shrink: 0;
  min-height: 48px;
}
.stripe-push { background: var(--push); }
.stripe-pull { background: var(--pull); }
.stripe-legs-q { background: var(--legs-q); }
.stripe-legs-f { background: var(--legs-f); }
.stripe-combo { background: var(--combo); }
.stripe-rest { background: var(--rest); }

.day-main { flex: 1; min-width: 0; }
.day-dow { font-size: 11px; color: var(--muted2); font-weight: 500; margin-bottom: 1px; }
.day-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 700; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.day-sub { font-size: 11px; color: var(--muted); }

.day-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.type-pill {
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.pill-push { background: rgba(249,115,22,0.15); color: var(--push); }
.pill-pull { background: rgba(59,130,246,0.15); color: var(--pull); }
.pill-legs-q { background: rgba(168,85,247,0.15); color: var(--legs-q); }
.pill-legs-f { background: rgba(16,185,129,0.15); color: var(--legs-f); }
.pill-combo { background: rgba(245,158,11,0.15); color: var(--combo); }
.pill-rest { background: rgba(42,48,69,0.5); color: var(--muted2); }

.day-check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent;
}
.day-card.is-done .day-check { background: var(--success); border-color: var(--success); color: #fff; }

.today-pip {
  position: absolute; top: 8px; left: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--push); box-shadow: 0 0 6px var(--push);
}

/* ══ SESSION VIEW ══ */
.session-top { padding: 18px 18px 12px; }
.session-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 8px; text-transform: uppercase; letter-spacing: 0.7px;
  margin-bottom: 8px;
}
.session-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px;
}
.session-sub { font-size: 13px; color: var(--muted2); line-height: 1.4; }

.ex-list { padding: 0 18px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 110px; }

/* exercise card */
.ex-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
}
.ex-head {
  padding: 13px 14px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
}
.ex-num {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; margin-top: 1px;
}
.ex-meta { flex: 1; min-width: 0; }
.ex-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.ex-muscle { font-size: 11px; color: var(--muted2); margin-bottom: 3px; }
.ex-spec { font-size: 11px; color: var(--muted); }
.ex-suggest {
  font-size: 11px; font-weight: 600; color: var(--warning);
  background: rgba(234,179,8,0.1); padding: 2px 7px; border-radius: 5px;
  display: inline-block; margin-top: 4px;
}
.ex-chevron { color: var(--muted); font-size: 11px; margin-top: 5px; flex-shrink: 0; transition: transform 0.2s; }
.ex-card.open .ex-chevron { transform: rotate(180deg); }

.ex-body { display: none; border-top: 1px solid var(--border); }
.ex-card.open .ex-body { display: block; }

.ex-how {
  padding: 13px 14px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.ex-how h4 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted); margin-bottom: 9px;
}
.ex-how ol { padding-left: 16px; display: flex; flex-direction: column; gap: 5px; }
.ex-how li { font-size: 12px; line-height: 1.5; color: #9aa0bc; }
.ex-tip {
  margin-top: 10px; padding: 8px 11px;
  background: rgba(249,115,22,0.07); border-left: 3px solid var(--push);
  border-radius: 0 6px 6px 0; font-size: 11px; color: #9aa0bc; line-height: 1.4;
}

/* sets log */
.sets-log { padding: 12px 14px 14px; }
.sets-log-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.sets-log-head h4 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted);
}
.prev-pr { font-size: 11px; color: var(--success); font-weight: 600; }

.col-labels {
  display: grid; grid-template-columns: 28px 1fr 1fr 38px;
  gap: 6px; margin-bottom: 5px;
}
.col-labels span {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--muted); text-align: center;
}

.set-rows { display: flex; flex-direction: column; gap: 5px; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 38px; gap: 6px; align-items: center; }
.set-n { font-size: 12px; font-weight: 600; color: var(--muted); text-align: center; }
.set-inp {
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 6px; color: var(--text);
  font-size: 13px; font-family: 'Inter', sans-serif;
  text-align: center; width: 100%; transition: border-color 0.15s;
}
.set-inp:focus { outline: none; border-color: var(--push); }
.set-inp::placeholder { color: var(--muted); font-size: 11px; }
.set-ok {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--muted); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.set-ok.done { background: var(--success); border-color: var(--success); color: #fff; }

/* session footer */
.session-foot {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 18px 16px;
  background: rgba(10,11,14,0.96); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
}
.finish-btn {
  width: 100%; background: var(--push); color: #fff;
  border: none; padding: 14px; border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.2px; transition: opacity 0.15s;
}
.finish-btn:active { opacity: 0.85; }
.finish-btn.done-state { background: #1a3526; color: var(--success); border: 1px solid var(--success); }

/* ══ HISTORY VIEW ══ */
.hist-top { padding: 20px 18px 12px; }
.hist-top h2 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 3px; }
.hist-top p { font-size: 13px; color: var(--muted2); }
.hist-list { padding: 0 18px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 30px; }
.hist-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
}
.hist-stripe { width: 3px; align-self: stretch; border-radius: 3px; min-height: 40px; flex-shrink: 0; }
.hist-info { flex: 1; }
.hist-date { font-size: 11px; color: var(--muted2); margin-bottom: 2px; }
.hist-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; }
.hist-sets { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hist-badge {
  font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 7px;
  text-transform: uppercase; letter-spacing: 0.4px;
}

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; line-height: 1.6; }

/* ══ BOTTOM NAV ══ */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(17,19,24,0.97); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; padding: 6px 0 14px;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--muted); cursor: pointer;
  padding: 5px 0; font-size: 10px; font-family: 'Inter', sans-serif;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
  transition: color 0.15s;
}
.bnav-btn .ico { font-size: 19px; }
.bnav-btn.active { color: var(--push); }

/* toast */
.toast {
  position: fixed; bottom: 86px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--success); color: #fff;
  padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 300; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Training<em>.</em>Log</div>
  <button class="back-btn" id="backBtn" onclick="goBack()">← Volver</button>
</div>

<div class="view active" id="viewWeek">
  <div class="week-top">
    <div class="week-greeting">Plan semanal</div>
    <div class="week-title" id="weekTitle">Esta semana</div>
  </div>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-range" id="weekRange"></span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="sSessions">0</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-box"><div class="stat-val" id="sStreak">0</div><div class="stat-lbl">Racha</div></div>
    <div class="stat-box"><div class="stat-val" id="sSets">0</div><div class="stat-lbl">Sets totales</div></div>
  </div>
  <div class="days-list" id="daysList"></div>
</div>

<div class="view" id="viewSession">
  <div class="session-top">
    <div class="session-pill" id="sPill"></div>
    <div class="session-title" id="sTitle"></div>
    <div class="session-sub" id="sSub"></div>
  </div>
  <div class="ex-list" id="exList"></div>
  <div class="session-foot">
    <button class="finish-btn" id="finishBtn" onclick="finishSession()">Marcar sesión completada ✓</button>
  </div>
</div>

<div class="view" id="viewHistory">
  <div class="hist-top">
    <h2>Historial</h2>
    <p>Sesiones completadas</p>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<div class="bnav" id="bnav">
  <button class="bnav-btn active" id="navWeek" onclick="showView('week')"><span class="ico">📅</span>Semana</button>
  <button class="bnav-btn" id="navHist" onclick="showView('history')"><span class="ico">📊</span>Historial</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// PERFIL DEL USUARIO
// ══════════════════════════════════════════════════
const USER = { weight: 80.8, height: 165 };

// ══════════════════════════════════════════════════
// PLAN SEMANAL
// dow: 0=Dom 1=Lun 2=Mar 3=Mie 4=Jue 5=Vie 6=Sab
// ══════════════════════════════════════════════════
const WEEK_PLAN = [
  { dow: 1, type: 'push',   title: 'Empuje',              sub: 'Pecho · Hombros · Tríceps' },
  { dow: 2, type: 'pull',   title: 'Jale',                sub: 'Espalda · Bíceps' },
  { dow: 3, type: 'legs-q', title: 'Piernas — Quad',      sub: 'Cuádriceps · Pantorrilla · Core' },
  { dow: 4, type: 'rest',   title: 'Descanso',            sub: 'Recuperación activa' },
  { dow: 5, type: 'legs-f', title: 'Piernas — Femoral',   sub: 'Femorales · Glúteos · Abductores' },
  { dow: 6, type: 'combo',  title: 'Empuje + Jale',       sub: 'Sesión corta — cierre de semana' },
  { dow: 0, type: 'rest',   title: 'Descanso',            sub: 'Tu día libre — descansa bien' },
];

const TYPE_META = {
  push:   { label: 'Empuje',   pillClass: 'pill-push',   stripeClass: 'stripe-push',   color: 'var(--push)' },
  pull:   { label: 'Jale',     pillClass: 'pill-pull',   stripeClass: 'stripe-pull',   color: 'var(--pull)' },
  'legs-q': { label: 'Piernas Q', pillClass: 'pill-legs-q', stripeClass: 'stripe-legs-q', color: 'var(--legs-q)' },
  'legs-f': { label: 'Piernas F', pillClass: 'pill-legs-f', stripeClass: 'stripe-legs-f', color: 'var(--legs-f)' },
  combo:  { label: 'Combo',    pillClass: 'pill-combo',  stripeClass: 'stripe-combo',  color: 'var(--combo)' },
  rest:   { label: 'Descanso', pillClass: 'pill-rest',   stripeClass: 'stripe-rest',   color: 'var(--rest)' },
};

// ══════════════════════════════════════════════════
// EJERCICIOS
// suggest: peso de arranque basado en 80.8kg / intermedio
// ══════════════════════════════════════════════════
const SESSIONS = {

push: {
  exercises: [
    {
      name: 'Push-up Manos Anchas',
      muscle: 'Pecho mayor · Hombro anterior · Tríceps',
      spec: '4 × Máx reps · Peso corporal',
      suggest: 'Peso corporal — apunta a 15+ reps',
      sets: 4, repsHint: 'Máx',
      instructions: [
        'Manos ligeramente más anchas que hombros, dedos al frente o levemente hacia afuera.',
        'Cuerpo rígido: activa abdomen y aprieta glúteos, sin hundir la cadera.',
        'Baja hasta ~2 cm del suelo, codos a 45° respecto al torso.',
        'Empuja hasta extender los codos sin bloquearlos.',
        'Inhala al bajar, exhala al empujar.'
      ],
      tip: 'Si llegas a 20+ reps fácil, cruza una banda de resistencia sobre la espalda para agregar carga.'
    },
    {
      name: 'Press de Hombro Sentado',
      muscle: 'Deltoides anterior y medial · Tríceps',
      spec: '4 × 10-12 · Mancuernas',
      suggest: '~7-8 kg por mancuerna de arranque',
      sets: 4, repsHint: '10-12',
      instructions: [
        'Siéntate en el tapete con piernas cruzadas o extendidas. Espalda erguida.',
        'Mancuernas a la altura de hombros, palmas al frente.',
        'Presiona hacia arriba hasta casi extender los codos.',
        'Baja con control — 2-3 segundos de bajada.',
        'Mantén el abdomen apretado para no arquear la espalda baja.'
      ],
      tip: 'Con tus mancuernas ajustables ya tienes suficiente para progresar varios meses aquí. Sube 1 disco cuando completes las 12 con facilidad en las 4 series.'
    },
    {
      name: 'Elevación Lateral',
      muscle: 'Deltoides medial',
      spec: '3 × 15 · Banda amarilla/verde o mancuerna 1-2 kg',
      suggest: 'Banda amarilla o mancuerna 1 kg — sube a verde cuando 15 reps se sientan fáciles',
      sets: 3, repsHint: '15',
      instructions: [
        'De pie o sentado. Codos ligeramente flexionados (~15°), nunca rectos.',
        'Sube los brazos lateralmente hasta la altura del hombro — no más.',
        'Al llegar arriba el dorso de la mano apunta hacia el techo (como vaciar una jarra).',
        'Baja 3 segundos. El negativo es donde más crece el deltoides.',
        'No uses impulso del torso ni encorves los hombros.'
      ],
      tip: 'Este músculo responde al volumen más que al peso. Más lento, más reps, siempre gana sobre más kilos.'
    },
    {
      name: 'Extensión de Tríceps sobre Cabeza',
      muscle: 'Tríceps — porción larga (estiramiento máximo)',
      spec: '3 × 12-15 · Banda en puerta (anclaje alto) o mancuerna',
      suggest: 'Banda azul en puerta, o mancuerna de ~6 kg sostenida con ambas manos',
      sets: 3, repsHint: '12-15',
      instructions: [
        'Ancla la banda en la parte alta de la puerta. Toma los extremos con ambas manos.',
        'Da un paso al frente para crear tensión. Inclínate ligeramente.',
        'Codos fijos arriba y a los lados de la cabeza — solo mueve el antebrazo.',
        'Extiende hacia abajo hasta recta completa. Aprieta el tríceps arriba.',
        'Regresa con control — no dejes que la banda te jale de golpe.'
      ],
      tip: 'La porción larga solo se activa completamente con el brazo elevado. Este ejercicio es el mejor para masa total del tríceps.'
    },
    {
      name: 'Patada de Tríceps (Kickback)',
      muscle: 'Tríceps — porción lateral (contracción máxima)',
      spec: '3 × 12 · Mancuerna',
      suggest: '~5-6 kg por brazo de arranque',
      sets: 3, repsHint: '12',
      instructions: [
        'Inclínate hacia adelante ~45°. Apoya una mano en la pared o muslo.',
        'Codo pegado al costado del torso, antebrazo colgando a 90°.',
        'Extiende el brazo hacia atrás hasta que quede completamente recto.',
        'Aprieta el tríceps en la posición extendida — mantén 1 segundo.',

function getDB() { try { return JSON.parse(localStorage.getItem('tlog2') || '{}'); } catch(e) { return {}; } }
function saveDB(d) { localStorage.setItem('tlog2', JSON.stringify(d)); }

// STATE
// ══════════════════════════════════════════════════
let weekOffset = 0;
let activeSession = null; // { type, dateKey, dayLabel }

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
function getWeekDates(offset) {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════
// WEEK VIEW
// ══════════════════════════════════════════════════
function renderWeek() {
  const dates = getWeekDates(weekOffset);
  const db = getDB();
  const opts = {day:'numeric',month:'short'};
  document.getElementById('weekRange').textContent =
    `${dates[0].toLocaleDateString('es-MX',opts)} — ${dates[6].toLocaleDateString('es-MX',opts)}`;
  document.getElementById('weekTitle').textContent =
    weekOffset===0?'Esta semana':weekOffset===-1?'Semana pasada':`Semana ${weekOffset>0?'+':''}${weekOffset}`;

  let sessCount=0, setsCount=0, streak=0;
  // streak
  const sd = new Date();
  for(let i=0;i<60;i++){
    const k=fmtDate(sd); const dow=sd.getDay();
    const plan=WEEK_PLAN.find(p=>p.dow===dow);
    if(plan?.type==='rest'){sd.setDate(sd.getDate()-1);continue;}
    if(db[k]?.done){streak++;sd.setDate(sd.getDate()-1);}else break;
  }

  const DOW_NAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const DOW_FULL  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  const list = document.getElementById('daysList');
  list.innerHTML = '';

  dates.forEach(date => {
    const dow = date.getDay();
    const plan = WEEK_PLAN.find(p=>p.dow===dow) || {type:'rest',title:'Descanso',sub:''};
    const meta = TYPE_META[plan.type] || TYPE_META.rest;
    const key = fmtDate(date);
    const done = db[key]?.done;
    if(done && plan.type!=='rest') sessCount++;
    if(done) setsCount += (db[key]?.totalSets||0);

    const card = document.createElement('div');
    card.className = `day-card${plan.type==='rest'?' is-rest':''}${done?' is-done':''}${isToday(date)?' is-today':''}`;

    card.innerHTML = `
      <div class="day-stripe ${meta.stripeClass}"></div>
      <div class="day-main">
        <div class="day-dow">${DOW_FULL[dow]} · ${date.toLocaleDateString('es-MX',opts)}</div>
        <div class="day-name">${plan.title}</div>
        <div class="day-sub">${plan.sub}</div>
      </div>
      <div class="day-right">
        <span class="type-pill ${meta.pillClass}">${meta.label}</span>
        <div class="day-check">${done?'✓':''}</div>
      </div>
      ${isToday(date)?'<div class="today-pip"></div>':''}
    `;

    if(plan.type!=='rest'){
      card.onclick = ()=>openSession(plan.type, key, `${DOW_FULL[dow]} ${date.toLocaleDateString('es-MX',opts)}`);
    }
    list.appendChild(card);
  });

  document.getElementById('sSessions').textContent = sessCount;
  document.getElementById('sStreak').textContent = streak;
  document.getElementById('sSets').textContent = setsCount;
}

function changeWeek(d) { weekOffset+=d; renderWeek(); }

// ══════════════════════════════════════════════════
// SESSION VIEW
// ══════════════════════════════════════════════════
function openSession(type, dateKey, dayLabel) {
  const session = SESSIONS[type];
  if(!session) return;
  activeSession = {type, dateKey, dayLabel};
  const db = getDB();
  const saved = db[dateKey] || {};
  const meta = TYPE_META[type];

  const pill = document.getElementById('sPill');
  pill.textContent = meta.label;
  pill.className = `session-pill ${meta.pillClass}`;
  document.getElementById('sTitle').textContent = dayLabel;
  document.getElementById('sSub').textContent = WEEK_PLAN.find(p=>p.type===type)?.sub || '';

  const isDone = saved.done;
  const btn = document.getElementById('finishBtn');
  btn.textContent = isDone ? '✓ Sesión completada — volver a marcar' : 'Marcar sesión completada ✓';
  btn.className = isDone ? 'finish-btn done-state' : 'finish-btn';

  const exList = document.getElementById('exList');
  exList.innerHTML = '';
  const color = meta.color;

  session.exercises.forEach((ex, ei) => {
    const savedEx = saved.exercises?.[ei] || {};
    const prevRec = findPrev(type, ei, dateKey, db);

    const card = document.createElement('div');
    card.className = 'ex-card';
    card.id = `ec${ei}`;

    let setsHTML = '';
    for(let s=0;s<ex.sets;s++){
      const ss = savedEx.sets?.[s] || {};
      setsHTML += `<div class="set-row">
        <div class="set-n">${s+1}</div>
        <input class="set-inp" type="number" inputmode="numeric" placeholder="${ex.repsHint}" value="${ss.reps||''}" oninput="saveSet(${ei},${s},'reps',this.value)">
        <input class="set-inp" type="text" placeholder="Equipo/peso" value="${ss.weight||''}" oninput="saveSet(${ei},${s},'weight',this.value)">
        <button class="set-ok${ss.done?' done':''}" onclick="toggleSetDone(${ei},${s},this)">✓</button>
      </div>`;
    }

    card.innerHTML = `
      <div class="ex-head" onclick="toggleEx(${ei})">
        <div class="ex-num" style="background:${color}18;color:${color}">${ei+1}</div>
        <div class="ex-meta">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle}</div>
          <div class="ex-spec">${ex.spec}</div>
          <div class="ex-suggest">💡 Sugerido: ${ex.suggest}</div>
        </div>
        <div class="ex-chevron">▼</div>
      </div>
      <div class="ex-body">
        <div class="ex-how">
          <h4>Cómo ejecutarlo</h4>
          <ol>${ex.instructions.map(i=>`<li>${i}</li>`).join('')}</ol>
          <div class="ex-tip">⚡ ${ex.tip}</div>
        </div>
        <div class="sets-log">
          <div class="sets-log-head">
            <h4>Registrar sets</h4>
            ${prevRec?`<span class="prev-pr">↑ Prev: ${prevRec}</span>`:''}
          </div>
          <div class="col-labels"><span></span><span>Reps</span><span>Equipo</span><span>✓</span></div>
          <div class="set-rows">${setsHTML}</div>
        </div>
      </div>`;

    exList.appendChild(card);
  });

  showView('session');
}

function findPrev(type, ei, currentKey, db) {
  const keys = Object.keys(db).filter(k=>k<currentKey && db[k].type===type).sort().reverse();
  for(const k of keys){
    const sets = db[k].exercises?.[ei]?.sets || {};
    const done = Object.values(sets).filter(s=>s.done);
    if(done.length) return done.map(s=>`${s.reps||'?'}r · ${s.weight||'PC'}`).join(' / ');
  }
  return null;
}

function toggleEx(ei) {
  document.getElementById(`ec${ei}`).classList.toggle('open');
}

function saveSet(ei, si, field, val) {
  if(!activeSession) return;
  const db = getDB();
  const k = activeSession.dateKey;
  if(!db[k]) db[k]={type:activeSession.type,exercises:{}};
  if(!db[k].exercises[ei]) db[k].exercises[ei]={sets:{}};
  if(!db[k].exercises[ei].sets[si]) db[k].exercises[ei].sets[si]={};
  db[k].exercises[ei].sets[si][field]=val;
  saveDB(db);
}

function toggleSetDone(ei, si, btn) {
  if(!activeSession) return;
  const db = getDB();
  const k = activeSession.dateKey;
  if(!db[k]) db[k]={type:activeSession.type,exercises:{}};
  if(!db[k].exercises[ei]) db[k].exercises[ei]={sets:{}};
  if(!db[k].exercises[ei].sets[si]) db[k].exercises[ei].sets[si]={};
  const cur = db[k].exercises[ei].sets[si].done;
  db[k].exercises[ei].sets[si].done = !cur;
  btn.classList.toggle('done');
  saveDB(db);
}

function finishSession() {
  if(!activeSession) return;
  const db = getDB();
  const k = activeSession.dateKey;
  if(!db[k]) db[k]={};
  db[k].done = true;
  db[k].type = activeSession.type;
  let total=0;
  Object.values(db[k].exercises||{}).forEach(ex=>Object.values(ex.sets||{}).forEach(s=>{if(s.done)total++;}));
  db[k].totalSets = total;
  saveDB(db);
  const btn = document.getElementById('finishBtn');
  btn.textContent = '✓ Sesión completada — volver a marcar';
  btn.className = 'finish-btn done-state';
  toast('¡Sesión completada! 💪');
  setTimeout(()=>goBack(), 1100);
}

// ══════════════════════════════════════════════════
// HISTORY VIEW
// ══════════════════════════════════════════════════
function renderHistory() {
  const db = getDB();
  const list = document.getElementById('histList');
  list.innerHTML = '';
  const keys = Object.keys(db).filter(k=>db[k].done).sort().reverse();
  if(!keys.length){
    list.innerHTML='<div class="empty-state">Aún no hay sesiones completadas.<br>¡Empieza hoy y construye tu racha!</div>';
    return;
  }
  const labels = {push:'Empuje',pull:'Jale','legs-q':'Piernas Quad','legs-f':'Piernas Femoral',combo:'Empuje + Jale'};
  keys.forEach(k=>{
    const d=db[k];
    const date=new Date(k+'T12:00:00');
    const meta=TYPE_META[d.type]||TYPE_META.rest;
    const item=document.createElement('div');
    item.className='hist-item';
    item.innerHTML=`
      <div class="hist-stripe ${meta.stripeClass}"></div>
      <div class="hist-info">
        <div class="hist-date">${date.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
        <div class="hist-name">${labels[d.type]||d.type||'Sesión'}</div>
        <div class="hist-sets">${d.totalSets||0} sets completados</div>
      </div>
      <span class="hist-badge ${meta.pillClass}">${meta.label}</span>`;
    list.appendChild(item);
  });
}

// ══════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bnav').style.display='flex';
  document.getElementById('backBtn').style.display='none';

  if(name==='week'){
    document.getElementById('viewWeek').classList.add('active');
    document.getElementById('navWeek').classList.add('active');
    renderWeek();
  } else if(name==='session'){
    document.getElementById('viewSession').classList.add('active');
    document.getElementById('bnav').style.display='none';
    document.getElementById('backBtn').style.display='flex';
  } else if(name==='history'){
    document.getElementById('viewHistory').classList.add('active');
    document.getElementById('navHist').classList.add('active');
    renderHistory();
  }
}

function goBack() { showView('week'); }

// INIT
renderWeek();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
